name: Docker Build and Test

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t qr-code-generator-app .

      - name: Run QR code generator
        run: |
          docker run --rm -v ${{ github.workspace }}/qr_codes:/app/qr_codes qr-code-generator-app --url https://github.com/thejps92

      - name: Verify QR code was generated
        run: |
          if ls qr_codes/QRCode_*.png 1>/dev/null 2>&1; then
            echo "QR code generated successfully"
          else
            echo "No QR code found" && exit 1
          fi
